            allowed: false,                 reason: 'daily_limit',                 message: 'Daily limit reached. DM Telegram for unlimited.',                 remaining: 0             };         }                  // 检查冷却时间（防刷）         const timeSinceLastRequest = (now - data.lastRequestTime) / 1000;         if (data.lastRequestTime > 0 && timeSinceLastRequest < CONFIG.cooldownSeconds) {             const waitSeconds = Math.ceil(CONFIG.cooldownSeconds - timeSinceLastRequest);             return {                 allowed: false,                 reason: 'cooldown',                 message: `Please wait ${waitSeconds} seconds before next request.`,                 remaining: CONFIG.dailyLimit - data.count             };         }                  return {             allowed: true,             reason: null,             remaining: CONFIG.dailyLimit - data.count         };     }          // 记录使用     recordUsage() {         const data = this.getUsageData();         data.count++;         data.lastRequestTime = Date.now();         this.saveUsageData(data);         return data;     }          // 获取剩余次数     getRemaining() {         const data = this.getUsageData();         return Math.max(0, CONFIG.dailyLimit - data.count);     } }  // 初始化管理器 const usageManager = new UsageManager();  // ============ UI 更新函数 ============ function updateUsageDisplay() {     const used = CONFIG.dailyLimit - usageManager.getRemaining();     const percentage = (used / CONFIG.dailyLimit) * 100;          document.getElementById('usageCount').textContent = `${used}/${CONFIG.dailyLimit}`;     document.getElementById('usageFill').style.width = `${percentage}%`;          // 如果达到限制，改变颜色     if (used >= CONFIG.dailyLimit) {         document.getElementById('usageFill').style.background = 'linear-gradient(90deg, #ffc107, #ff9800)';         document.getElementById('usageCount').style.color = '#ff9800';     } else {         document.getElementById('usageFill').style.background = 'linear-gradient(90deg, #007bf t');     resultDiv.innerHTML = `<div class="error-message">⚠️ ${message}</div>`; }  function showLoading() {     const resultDiv = document.getElementById('result');     resultDiv.innerHTML = '<div class="result-loading">✨ AI is paraphrasing your text...</div>'; }  function showResult(text) {     const resultDiv = document.getElementById('result');     resultDiv.innerHTML = `         ${text}         <button class="copy-btn" onclick="copyResult(this)" title="Copy to clipboard">             📋 Copy         </button>     `; }  // ============ 主要功能 ============ async function rewrite() {     const inputText = document.getElementById('input').value.trim();     const button = document.getElementById('rewriteBtn');          // 输入验证     if (!inputText) {         showError('Please enter some text to paraphrase.');         return;     }          if (inputText.length < CONFIG.minTextLength) {         showError(`Text is too short. Minimum ${CONFIG.minTextLength} characters required.`);         return;     }          if (inputText.length > CONFIG.maxChars) {         showError(`Text exceeds maximum limit of ${CONFIG.maxChars} characters.`);         return;     }          // 检查使用权限     const usageCheck = usageManager.canUse();     if (!usageCheck.allowed) {         if (usageCheck.reason === 'daily_limit') {             showLimitReached();         } else {             showError(usageCheck.message);         }         return;     }          // 检查 API Key     if (CONFIG.apiKey === 'sk-ws-H.EMIIXIH.8Cpo.MEYCIQDQqMt6xlTmL96q3aah9RKMh4EC1a1m8jkTgH3IHF68hgIhALN7oa4ZUBcAcw-CXseoOK-j2O0qbX6z5tdIjSaU_xaS') {         showError('API Key not configured. Please contact admin on Telegram.');         return;     }          // 开始处理     button.disabled = true;     button.innerHTML = '⏳ Processing...';     showLoading();          try {         const response = await fetch(CONFIG.apiUrl, {             method: 'POST',             headers: {                 'Content-Type': 'application/json',                 'Authorization': `Bearer ${CONFIG.apiKey}`             },             body: JSON.stringify({                 model: CONFIG.model,                 messages: [                     {                         role: 'system',                         content: 'You are a professional text paraphraser. Your task is to rewrite the given text while maintaining its original meaning. Improve clarity, fluency, and vocabulary. Important rules: 1) Only return the paraphrased text 2) No explanations or additional comments 3) Keep similar length 4) Preserve the original tone and style.'                     },                     {                         role: 'user',                         content: `Please paraphrase this text:\n\n${inputText}`                     }                 ],                 temperature: 0.7,                 max_tokens: Math.min(inputText.length * 2, 4000),                 top_p: 0.9,                 frequency_penalty: 0.1,                 presence_penalty: 0.1             })         });                  if (!response.ok) {             const errorData = await response.json().catch(() => ({}));             const errorMsg = errorData.error?.message || `HTTP ${response.status}: Request failed`;                          // 处理特定错误             if (response.status === 401) {                 throw new Error('Invalid API Key. Please contact admin.');             } else if (response.status === 429) {                 throw new Error('Too many requests. Please try again later.');             } else if (response.status === 402) {                 throw new Error('API quota exceeded. Contact admin to upgrade.');             } else {                 throw new Error(errorMsg);             }         }                  const data = await response.json();                  // 提取结果         let output = data.choices?.[0]?.message?.content;                  if (!output || output.trim().length === 0) {             throw new Error('No response generated. Please try with different text.');         }                  // 清理输出         output = output.replace(/^["'`]|["'`]$/g, '').trim();                  // 记录使用         usageManager.recordUsage();         updateUsageDisplay();                  // 显示结果         showResult(output);              } catch (error) {         console.error('API Error:', error);         showError(`Request failed: ${error.message}`);     } finally {         // 恢复按钮         button.disabled = false;         button.innerHTML = '🔄 Paraphrase Now';     } }  // ============ 辅助功能 ============ function clearAll() {     document.getElementById('input').value = '';     document.getElementById('result').innerHTML = '<div class="result-empty">✨ Your paraphrased text will appear here</div>';     document.getElementById('charCount').textContent = '0'; }  function copyResult(button) {     const resultDiv = document.getElementById('result');     const text = resultDiv.innerText.replace('📋 Copy', '').trim();          navigator.clipboard.writeText(text).then(() => {         button.textContent = '✅ Copied!';         button.style.background = '#28a745';         button.style.color = 'white';         button.style.borderColor = '#28a745';                  setTimeout(() => {             button.textContent = '📋 Copy';             button.style.background = 'white';             button.style.color = '#666';             button.style.borderColor = '#ddd';         }, 2000);     }).catch(() => {         // 降级方案         const textarea = document.createElement('textarea');         textarea.value = text;         document.body.appendChild(textarea);         textarea.select();         document.execCommand('copy');         document.body.removeChild(textarea);         button.textContent = '✅ Copied!';         setTimeout(() => {             button.textContent = '📋 Copy';         }, 2000);     }); }  // 键盘快捷键 document.addEventListener('keydown', function(e) {     // Ctrl/Cmd + Enter 触发改写     if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {         e.preve
